services:
  - type: web
    name: visioned-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://visionedd-frontend.onrender.com
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: ML_MODEL_URL
        value: https://visioned-ml-model.onrender.com/predict

  - type: web
    name: visioned-ml-model
    runtime: python
    plan: free
    rootDir: ml-model
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://visionedd-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173

  - type: web
    name: visionedd-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://visioned-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
